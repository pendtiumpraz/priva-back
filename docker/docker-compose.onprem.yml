version: '3.8'

# =============================================================================
# PRIVASIMU NEXUS — On-Prem Self-Contained Stack
# =============================================================================
# Drop-in deployment for clients who want Privasimu running in their own
# datacenter (banks, multifinance with strict POJK 38/2016 data residency
# requirements). All persistent data lives on volumes mounted from the host;
# no AWS-specific services.
#
# Architecture: TWO Postgres instances by default — landlord (platform meta)
# and tenant_cluster (per-tenant DBs created by the provisioner). Both can
# be merged into one Postgres instance by pointing TENANT_DB_PROVISIONER_HOST
# at `landlord-db` instead of `tenant-db`, but keeping them separate is the
# recommended layout because:
#   - landlord runs steady transactional load (auth, menu registry, RBAC)
#   - tenant_cluster grows with N tenants and may need separate tuning
#   - separate failure domains keep an over-loaded tenant DB from breaking
#     auth for everyone
#
# Pre-flight:
#   1. cp .env.onprem.example .env.onprem        # adjust passwords & paths
#   2. ensure host has 4GB RAM minimum, 20GB disk for landlord, 50GB+ tenant
#   3. docker compose -f backend/docker/docker-compose.onprem.yml up -d
#   4. backend/scripts/install-onprem.sh         # wizard for first-run setup
#
# After install, register the tenant cluster as a DatabasePool via the UI:
#   /platform-admin/database-pools → Add → host=tenant-db, port=5432, etc.
#
# License activation: backend phones home to license-manager on boot. For
# air-gapped deployments, set LICENSE_MODE=offline and supply LICENSE_KEY +
# LICENSE_TOKEN_FILE — see ONPREM_DEPLOY.md.

services:
  # ─── Landlord Database (Postgres) ────────────────────────────────────────
  # Holds users, organizations, licenses, menu registry, app_settings,
  # database_pools, storage_pools, tenant_change_requests, audit_logs.
  landlord-db:
    image: postgres:16-alpine
    container_name: privasimu-landlord-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LANDLORD_DB_NAME:-privasimu_landlord}
      POSTGRES_USER: ${LANDLORD_DB_USER:-privasimu_landlord}
      POSTGRES_PASSWORD: ${LANDLORD_DB_PASSWORD:?LANDLORD_DB_PASSWORD must be set in .env.onprem}
    volumes:
      - landlord_db_data:/var/lib/postgresql/data
      # Optional: mount a host directory for backups
      # - /opt/privasimu/backups/landlord:/backups
    ports:
      - "${LANDLORD_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANDLORD_DB_USER:-privasimu_landlord}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - privasimu-net

  # ─── Tenant Cluster Database (Postgres) ─────────────────────────────────
  # Privasimu's PrivasimuHostedProvisioner connects here as the provisioner
  # user and runs CREATE DATABASE for each new isolated tenant. Each tenant
  # gets its own DB inside this single instance, with its own DB user too.
  # See BYODB.md §2 for the design rationale.
  tenant-db:
    image: postgres:16-alpine
    container_name: privasimu-tenant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${TENANT_DB_PROVISIONER_USER:-privasimu_provisioner}
      POSTGRES_PASSWORD: ${TENANT_DB_PROVISIONER_PASSWORD:?TENANT_DB_PROVISIONER_PASSWORD must be set in .env.onprem}
    volumes:
      - tenant_db_data:/var/lib/postgresql/data
    ports:
      - "${TENANT_DB_PORT:-5433}:5432"   # different host port to avoid clash with landlord
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TENANT_DB_PROVISIONER_USER:-privasimu_provisioner}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - privasimu-net

  # ─── Redis (Cache + Queue) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: privasimu-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-privasimu_redis}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - privasimu-net

  # ─── MinIO (S3-Compatible Storage) ──────────────────────────────────────
  # On-prem default storage backend. Register this as a StoragePool via UI
  # after first boot:
  #   /platform-admin/storage-pools → Add → driver=minio, endpoint=http://minio:9000
  minio:
    image: minio/minio:latest
    container_name: privasimu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-privasimu_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.onprem}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"        # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    networks:
      - privasimu-net

  # ─── Laravel Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: privasimu-backend
    restart: unless-stopped
    depends_on:
      landlord-db:
        condition: service_healthy
      tenant-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_NAME: Privasimu
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY:?APP_KEY must be set in .env.onprem (generate via php artisan key:generate)}

      # Landlord DB — Laravel default connection
      DB_CONNECTION: pgsql
      DB_HOST: landlord-db
      DB_PORT: 5432
      DB_DATABASE: ${LANDLORD_DB_NAME:-privasimu_landlord}
      DB_USERNAME: ${LANDLORD_DB_USER:-privasimu_landlord}
      DB_PASSWORD: ${LANDLORD_DB_PASSWORD}
      DB_SSLMODE: disable

      # Tenant cluster — referenced by DatabasePool rows registered via UI
      # These env vars are NOT read directly by Laravel; they're for the
      # operator running install-onprem.sh which auto-registers a default
      # pool pointing at this cluster.
      TENANT_DB_HOST: tenant-db
      TENANT_DB_PORT: 5432
      TENANT_DB_PROVISIONER_USER: ${TENANT_DB_PROVISIONER_USER:-privasimu_provisioner}
      TENANT_DB_PROVISIONER_PASSWORD: ${TENANT_DB_PROVISIONER_PASSWORD}

      # Cache + Queue
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-privasimu_redis}

      # Storage default (will fall back to local until a StoragePool is registered)
      FILESYSTEM_DISK: local

      # License activation
      LICENSE_MODE: ${LICENSE_MODE:-online}        # online | offline
      LICENSE_KEY: ${LICENSE_KEY:-}
      LICENSE_SERVER_URL: ${LICENSE_SERVER_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_storage:/var/www/html/storage
      # On-prem deployments may want to mount logs to host for SIEM ingestion
      - ${BACKEND_LOGS_HOST_PATH:-./logs}:/var/www/html/storage/logs
    networks:
      - privasimu-net

  # ─── Queue Worker ────────────────────────────────────────────────────────
  # Separate container so we can scale workers independently of HTTP traffic.
  # Picks up ProvisionTenantDatabaseJob / MigrateTenantDataJob etc.
  queue-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: privasimu-queue
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    entrypoint: []
    command: ["php", "artisan", "queue:work", "--queue=document-imports,default", "--tries=3", "--timeout=300", "--sleep=3", "--max-jobs=1000", "--max-time=3600"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: landlord-db
      DB_PORT: 5432
      DB_DATABASE: ${LANDLORD_DB_NAME:-privasimu_landlord}
      DB_USERNAME: ${LANDLORD_DB_USER:-privasimu_landlord}
      DB_PASSWORD: ${LANDLORD_DB_PASSWORD}
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-privasimu_redis}
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - privasimu-net

  # ─── Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-/api}
    container_name: privasimu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - privasimu-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: privasimu-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      # Uncomment for TLS:
      # - "443:443"
    volumes:
      - ./nginx-onprem.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount certs when terminating TLS:
      # - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      # - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      - frontend
      - backend
    networks:
      - privasimu-net

volumes:
  landlord_db_data:
    driver: local
  tenant_db_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_storage:
    driver: local

networks:
  privasimu-net:
    driver: bridge
