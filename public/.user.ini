; Shared hosting / cPanel PHP override.
; .user.ini di-read otomatis oleh PHP-FPM untuk direktori ini saat
; default shared hosting punya limit kecil (upload_max_filesize 2M,
; post_max_size 8M). Naikkan ke 50M supaya endpoint upload Privasimu
; (gap-assessment evidence 10MB, maturity, vendor-risk, document
; import) tidak silently fail karena PHP reject body sebelum sampai
; ke Laravel validator.
upload_max_filesize = 50M
post_max_size = 50M
max_file_uploads = 20
memory_limit = 256M
max_execution_time = 120
